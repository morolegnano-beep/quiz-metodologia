<style>
  :root {
    --bordeaux: #7B1535;
    --oro: #F0C040;
    --verde: #1E7B34;
    --rosso: #B3261E;
    --grigio: #F7F2F0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #fafafa;
    color: #2a2a2a;
    margin: 0;
    padding: 0;
  }
  header {
    background: var(--bordeaux);
    color: white;
    padding: 18px 24px;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
  }

    font-size: 13px;

  }

    align-items: center;
    margin-bottom: 16px;
    font-size: 14px;
    color: #555;
  }

    border-radius: 6px;
    height: 8px;
    width: 100%;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .progress-bar {

    height: 100%;

  }
  .card {

  }
  .block-tag {

    text-transform: uppercase;

    background: #f3e3e8;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .question {
    font-size: 17px;
    line-height: 1.45;
    margin-bottom: 18px;
    font-weight: 600;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    text-align: left;
    border: 1px solid #ddd;
    background: white;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14.5px;
    line-height: 1.4;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .option:hover:not(:disabled) {
    border-color: var(--bordeaux);
    background: #fbf3f5;
  }
  .option:disabled {
    cursor: default;
  }
  .option.correct {
    border-color: var(--verde);
    background: #e9f6ec;
    color: var(--verde);
    font-weight: 700;
  }
  .option.wrong {
    border-color: var(--rosso);
    background: #fbeaea;
    color: var(--rosso);
    font-weight: 700;
  }
  .option.selected {
    border-color: var(--bordeaux);
    background: #f3e3e8;
    font-weight: 700;
  }
  .feedback {
    margin-top: 14px;
    font-size: 14px;
    min-height: 20px;
  }
  .feedback.ok { color: var(--verde); font-weight: 600; }
  .feedback.ko { color: var(--rosso); font-weight: 600; }
  .controls {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
  }
  button.next {
    background: var(--bordeaux);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14.5px;
    cursor: pointer;
    display: none;
  }
  button.next:hover { opacity: 0.9; }
  .score-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .score-screen h2 {
    color: var(--bordeaux);
    margin-bottom: 6px;
  }
  .score-big {
    font-size: 48px;
    font-weight: 800;
    color: var(--bordeaux);
    margin: 14px 0;
  }
  .score-sub {
    color: #666;
    margin-bottom: 26px;
  }
  button.restart {
    background: var(--oro);
    color: #4a3500;
    border: none;
    border-radius: 8px;
    padding: 12px 26px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  button.restart:hover { opacity: 0.9; }
  .start-screen { text-align: center; padding: 30px 20px; }
  .start-screen p { color: #555; line-height: 1.6; margin-bottom: 22px; }
  button.start {
    background: var(--bordeaux);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 13px 30px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .review-list {
    text-align: left;
    margin-top: 24px;
    font-size: 13px;
    color: #444;
  }
  .review-item {

    padding: 10px 0;
  }
  .review-item .rq { font-weight: 600; margin-bottom: 4px; }
  .review-item .ra { color: var(--verde); }
  .review-item .rblock {
    display: inline-block;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--bordeaux);
    background: #f3e3e8;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 6px;
  }
</style>
</head>

ock": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Cosa afferma Alberto Marradi riguardo ai nessi proposti dalle spiegazioni causali fra i loro referenti (eventi, stati, ecc.)?", "a": "Che non sono direttamente osservabili.", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Cosa stigmatizza il sociologo Melville Dalton riguardo al rapporto tra scienze sociali e naturali?", "a": "La sudditanza di troppi scienziati sociali verso le scienze “dure”.", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Di fronte alla proliferazione di software di analisi e tecniche avanzate, quale criticità metodologica è stata evidenziata da studiosi come Ricolfi o Labovitz?", "a": "Squilibrio tra lo sviluppo di questi metodi e la loro applicazione effettiva", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Già negli anni '70 il metodologo Vittorio Capecchi stigmatizzava lo squilibrio esistente fra", "a": "lo sviluppo autonomo dei metodi matematici e le loro effettive applicazioni", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "I casi dei Maya dello Yucatan e degli Indios dell'Amazzonia, menzionati dal metodologo Marradi, sono indicativi del fatto che gli esseri umani generalmente non riescono a concettualizzare in modo autonomo qualcosa che", "a": "non sia stata loro descritta a viva voce da altre persone", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "I metodologi sottolineano concordemente che, per via della specifica natura delle variabili costruite con le scale, è necessario limitarsi a chiamarle", "a": "quasi-cardinali", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Il numero massimo di partecipanti ad un focus group è stato fissato dai metodologi a", "a": "6", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Il Centro Metodologico di Łódź in Polonia durante la dittatura comunista effettuava", "a": "Controlli basati sul riesame sistematico e dettagliato dei questionari di un sottoinsieme del campione", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Il filone delle ricerche condotte con la tecnica dell'osservazione partecipante e rivolta a studiare un fenomeno sociale del quale il ricercatore stesso ha fatto o fa ancora parte prende il nome di", "a": "sociologia autobiografica", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Il fondatore dell'etnometodologia negli anni '60 è stato lo studioso americano", "a": "Harold Garfinkel", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Il metodologo Corbetta ritiene che negli anni '20 e '30 del XX secolo il rapporto fra sostenitori della ricerca quantitativa e qualitativa sia stato caratterizzato da", "a": "un confronto vivace e fruttuoso fra le due parti", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "In merito al rapporto fra termini e concetti, la posizione del metodologo Marradi è che", "a": "il collegamento fra termine e concetti è mutevole nello spazio e nel tempo per via della natura stessa dei concetti", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "La prima delle tre tesi all'apparenza condivisibili e relative ai concetti enumerata da Marradi è la tesi secondo cui", "a": "Chi pensa deve essere consapevole dei concetti che ha in mente in un dato momento", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "La tendenza ad attribuire eccessiva importanza alle tecniche di ricerca anche nelle scienze umane e sociali era già stata criticata da uno dei primi sociologi, ossia", "a": "Simmel", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Qual è l'obiettivo finale a cui mira l'iterazione controllata e anonima nel Metodo Delphi?", "a": "Ottenere una convergenza di opinioni e identificare tendenze comuni", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Qual è la prima delle tre tesi sui concetti elencate (e criticate) da Alberto Marradi?", "a": "Chi pensa dev'essere consapevole dei concetti che ha in mente in un dato momento.", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Quale metodologo italiano ha elaborato il concetto di “ciclo metodologico della ricerca sociale” (composto da 4 fasi: costituzione, trattamento, interpretazione, diffusione)?", "a": "(Costantino) Cipolla.", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Quali sono i due aggettivi usati in metodologia per descrivere, rispettivamente 1) il processo non lineare di raccolta e analisi dati nella Grounded Theory, e 2) la specifica definizione di “intervista qualitativa” coniata da Mario Cardano?", "a": "Iterativo e discorsivo", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Riguardo al limite teorico degli esperimenti nelle scienze sociali, che cosa osserva Marradi a proposito dell'influenza di ritorno tra proprietà sperimentale e operativa?", "a": "Non sempre si può escludere", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Secondo Corbetta i sociologi positivisti fino all'inizio del Novecento seguirono il metodo (NB: il Paniere riporta “Induttivo” alla stessa domanda — verificare)", "a": "ipotetico deduttivo", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Il metodo ipotetico deduttivo è stato sviluppato dagli specialisti delle scienze", "a": "fisiche e matematiche", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Secondo il metodologo Costantino Cipolla, che si adotti l'approccio ipotetico-deduttivo o induttivo, la ricerca sociale si compone sempre e comunque di", "a": "4 fasi", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Secondo il sociologo Costantino Cipolla, la ricerca sociale si compone sempre e comunque di", "a": "Teoria e ricerca empirica.", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Uno dei rischi evidenziati nella metodologia della ricerca sociale riguarda", "a": "La trascuratezza nelle fasi di costruzione concettuale e trasformazione delle proprietà in variabili", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "L'aggregazione non deve diventare", "a": "Una banale classificazione fine a se stessa", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Per metodologia intendiamo (NB: il Paniere riporta “riflessione sul metodo” alla domanda equivalente — verificare)", "a": "Una critica della ricerca scientifica", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Marradi, dal canto suo, traccia un parallelismo fra l'eccesso di specializzazione in alcune tecniche ed il consumismo, “dato che hanno due caratteristiche in comune:", "a": "la tendenza a orientarsi verso il prodotto nuovo abbandonando il vecchio", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Ricerca scientifica, Galileo", "a": "Il primo embrione di metodo sperimentale", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Uno dei limiti della ricerca sociale contemporanea è rappresentato da", "a": "Lo squilibrio tra il perfezionamento tecnico dei metodi e la loro effettiva e consapevole applicazione nella ricerca empirica", "block": "BLOCCO 1 — Metodo, metodologia, tecnica"}, {"q": "Che cosa va a definire esattamente l'intensione di un concetto all'interno dell'attività di ricerca e classificazione?", "a": "Il particolare e preciso contenuto di un termine", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Come osservò l'economista Jevons, le forme viventi", "a": "non ammettono rigorose linee di demarcazione", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Come vengono interpretate e ridotte le azioni umane secondo i postulati del behaviorismo radicale che prescinde da motivazioni o stati di coscienza?", "a": "Reazioni all'ambiente fisico perlopiù inconsce", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Con il termine “midrange” si intende", "a": "La metà della somma del valore minimo e del valore massimo della distribuzione", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Di che cosa è oggetto la riflessione critica generale intorno alla conoscenza scientifica (epistemologia)?", "a": "della scienza", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "I filosofi Spirito e Mondolfo, nella loro definizione enciclopedica, sostengono che grosso modo si può dire che scienza è diventato sinonimo di", "a": "conoscenza dell'universale", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Il concetto di “coda lunga” è stato elaborato da", "a": "Chris Anderson", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "L'approccio teorico di Alfred Schutz si colloca nell'ambito della", "a": "Fenomenologia sociologica", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Il sociologo Alfred Schutz fu esponente della scuola di pensiero di orientamento non-standard nota come", "a": "fenomenologia sociologica", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Il modo di parlare della realtà sociale ricorrendo massicciamente alla statistica fu definito da Lazarsfeld", "a": "Linguaggio delle variabili", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Il rapporto fra discipline formali e scienze empiriche è", "a": "problematico", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Il termine che indica una nuova mappatura del potere globale fondata sulle infrastrutture, le reti e le connessioni piuttosto che sui confini degli Stati è", "a": "Connettografia", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Il termine tecnico che indica il variare delle variabili dipendenti per l'azione di quelle indipendenti è", "a": "varianza", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "In una sua accezione più semplice e comune il termine “epistemologia” è divenuto di fatto sinonimo di", "a": "Filosofia della scienza", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "La classificazione elaborata dall'antropologo James Spradley si articola in", "a": "domande descrittive, domande strutturali e domande contrasto", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Marradi asserisce che il disinteresse degli studiosi per i concetti si deve all'influsso di un connubio fra", "a": "epistemologia certista e gnoseologia realista", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Nel contesto dell'analisi della varianza (ANOVA), il p-value indica", "a": "Il livello di significatività del test dell'ipotesi nulla", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Nel processo di attribuzione di un nome a un oggetto o a un fenomeno, il termine corretto è", "a": "Nomination", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Nel rapporto tra discipline formali e scienze empiriche, la riflessione epistemologica moderna sostiene che", "a": "Le scienze non ammettono rigorose linee di demarcazione assolute", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Perché la realtà empirica è difficilmente incasellabile in classi in maniera perfetta e ben delimitata — frase dell'economista William Stanley Jevons", "a": "“le forme viventi non ammettono rigorose linee di demarcazione”", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Qual è l'obiettivo principale della preparazione degli intervistatori nel somministrare un questionario evitando di trasmettere aspettative?", "a": "Non alterare la libera espressione di pensiero dei soggetti stessi", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Qual è la prima delle tre tesi fondamentali (esplicitata da Gellner) per un uso corretto e rigoroso dei concetti nella ricerca?", "a": "Chi pensa deve essere consapevole dei concetti che ha in mente", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Quale approccio alla conoscenza emerge come obiettivo fondamentale nei tempi attuali?", "a": "Umanista", "block": "BLOCCO 2 — Conoscenza, linguaggio, concetti"}, {"q": "Quale co const SHAPE_POOLS = {"persons": ["Achenwall", "Aristotele", "Auguste Comte", "Bridgman", "Bunge", "Campbell e Fiske", "Cantril e Free", "Cartesio", "Chris Anderson", "Corbetta", "Crespi", "Danny Jorgensen", "Friedrichs", "Galileo Galilei", "George Udny Yule", "Ghilini", "Glaser e Strauss", "Harold Garfinkel", "Hilbert", "Karl Marx", "Kozinets", "Labovitz", "Likert e Guttman", "Malinowski", "Marradi", "Mills", "Nancy Baym", "Neyman", "Patton", "Popper", "Rheingold", "Ricolfi", "Rorty", "Russell", "Simmel", "Thurstone", "Titmuss", "Weitzman e Miles", "Windelband", "Yule", "Kuhn", "Weber", "Durkheim", "Sartori", "Schutz", "Mead", "Goffman", "Dilthey", "Spradley", "Jevons", "Jankowski", "Spearman", "Garfinkel", "Lazarsfeld", "Pierre Lévy", "David Weinberger", "Meyrowitz", "Cipolla", "Cardano", "Gallino", "Bryman", "Blalock", "Merton", "Morgan", "Helmer e Dalkey"], "numbers_decades": ["1926", "3 categorie", "4 fasi", "6", "80 e 90", "Anni '80", "Anni '80 e '90", "anni '60", "anni '90", "dagli anni '30 agli anni '70", "gli anni '80", "negli anni '80", "2 categorie", "5 fasi", "7 fasi", "da 5 a 20", "14", "10 categorie", "2008", "1991", "1989", "1984", "1959", "1935", "1913", "1937"], "yesno": ["Sì", "No", "Dipende"], "country_ruler": ["Germania di Bismarck.", "Italia dei Savoia", "Inghilterra di Churchill", "Francia di Napoleone III", "Spagna di Franco", "Austria di Francesco Giuseppe", "Russia di Stalin", "Prussia di Federico il Grande"]};

function classifyShape(answer) {
  const a = answer.trim();
  const al = a.toLowerCase();
  if (al === 'sì' || al === 'sì.' || al === 'no' || al === 'no.') return 'yesno';
  if (/^\d+$/.test(a.replace(/\.$/, ''))) return 'numbers_decades';
  if (/anni\s*'?\d|^\d{4}$|decennio/.test(al)) return 'numbers_decades';
  if (/\bdi\s+[A-ZÀ-Ý]/.test(a) && a.split(' ').length <= 5 && /^[A-ZÀ-Ý]/.test(a)) return 'country_ruler';
  if (SHAPE_POOLS.persons.includes(a)) return 'persons';
  return null;
}

// Numero di parole di una risposta, per valutarne la "lunghezza/struttura"
function wordCount(s) {
  return s.trim().split(/\s+/).filter(Boolean).length;
}

// Fascia di lunghezza: 0 = singola parola, 1 = breve (2-3 parole),
// 2 = media (4-7 parole), 3 = lunga (8+ parole, frase descrittiva)
function lengthBand(s) {
  const n = wordCount(s);
  if (n <= 1) return 0;
  if (n <= 3) return 1;
  if (n <= 7) return 2;
  return 3;
}

// Filtra un pool di candidati tenendo solo quelli con lunghezza simile alla risposta corretta,
// allargando la fascia consentita solo se non ce ne sono abbastanza
function filterByBand(candidates, correct) {
  const targetBand = lengthBand(correct);
  let exact = candidates.filter(a => lengthBand(a) === targetBand);
  if (exact.length >= 3) return exact;
  const near = candidates.filter(a => Math.abs(lengthBand(a) - targetBand) === 1 && !exact.includes(a));
  return exact.concat(near);
}

// Normalizza un testo per il confronto (minuscolo, solo lettere/numeri)
function normalizeForDup(s) {
  return s.toLowerCase().replace(/[^a-z0-9à-ÿ]+/g, '');
}

// Estrae le sequenze numeriche presenti in un testo (es. "266", "1991")
function digitGroups(s) {
  return (s.match(/\d+/g) || []);
}

// Vero se 'candidate' è in pratica la stessa informazione di 'correct'
// (stessa stringa normalizzata, una contenuta nell'altra, o stessi numeri/date citati)
function isDuplicateOf(correct, candidate) {
  const nc = normalizeForDup(correct);
  const nd = normalizeForDup(candidate);
  if (nc === nd) return true;
  if (nc.length > 4 && (nd.includes(nc) || nc.includes(nd))) return true;
  const dgC = digitGroups(correct);
  const dgD = digitGroups(candidate);
  if (dgC.length && dgD.length) {
    for (const d of dgC) {
      if (dgD.includes(d)) return true;
    }
  }
  return false;
}

const QUIZ_LENGTH = 30;

let pool = [];
let current = 0;
let score = 0;
let userAnswers = [];
let answered = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildOptions(qIndex) {
  const correct = pool[qIndex].a;
  const block = pool[qIndex].block;
  let candidates = [];

  const notDuplicate = a => !isDuplicateOf(correct, a);
  const notAlreadyPicked = a => !candidates.includes(a);

  // priorità 1: stessa "forma" della risposta (nome proprio, numero/decennio, sì/no, paese+personaggio)
  // con in più lo stesso vincolo di lunghezza/struttura, perché anche dentro una categoria
  // (es. "numeri/decenni") possono convivere risposte molto diverse come lunghezza ("14" vs "Anni '80 e '90")
  const shape = classifyShape(correct);
  if (shape && SHAPE_POOLS[shape]) {
    const shapeRaw = SHAPE_POOLS[shape].filter(a => a !== correct).filter(notDuplicate);
    const shapeCandidates = filterByBand(shapeRaw, correct);
    candidates = candidates.concat(shuffle(shapeCandidates));
  }

  // priorità 2: risposte vere del Paniere ufficiale, stesso argomento del blocco
  // E con una lunghezza/struttura simile alla risposta corretta (per evitare frasi lunghe
  // abbinate a risposte brevi, o viceversa)
  if (candidates.length < 3) {
    const fromPaniereRaw = (PANIERE_POOL[block] || []).filter(a => a !== correct).filter(notDuplicate).filter(notAlreadyPicked);
    const fromPaniere = filterByBand(fromPaniereRaw, correct);
    candidates = candidates.concat(shuffle(fromPaniere));
  }

  // priorità 3: risposte di altre domande inedite dello stesso blocco, stessa fascia di lunghezza
  if (candidates.length < 3) {
    const sameBlockRaw = pool.filter((p, i) => i !== qIndex && p.block === block).map(p => p.a).filter(notDuplicate).filter(notAlreadyPicked);
    const sameBlock = filterByBand(sameBlockRaw, correct);
    candidates = candidates.concat(shuffle(sameBlock));
  }

  // priorità 4: se il pool tematico non basta, riprovo senza vincolo di blocco ma
  // mantenendo il vincolo di lunghezza/struttura (meglio un argomento diverso ma
  // una risposta "credibile" nella forma, che una frase palesemente fuori posto)
  if (candidates.length < 3) {
    const allPaniereAnswers = Object.values(PANIERE_POOL).flat();
    const wideRaw = allPaniereAnswers.filter(a => a !== correct).filter(notDuplicate).filter(notAlreadyPicked);
    const wide = filterByBand(wideRaw, correct);
    candidates = candidates.concat(shuffle(wide));
  }

  // priorità 5 (fallback estremo): qualunque altra risposta del questionario
  if (candidates.length < 3) {
    const anyOther = pool.filter((p, i) => i !== qIndex).map(p => p.a).filter(notDuplicate).filter(notAlreadyPicked);
    candidates = candidates.concat(shuffle(anyOther));
  }

  // rete di sicurezza finale: anche in caso di dati duplicati a monte,
  // mi assicuro che le opzioni mostrate siano sempre 4 stringhe distinte
  const uniqueCandidates = [];
  for (const c of candidates) {
    if (!uniqueCandidates.includes(c) && c !== correct) uniqueCandidates.push(c);
  }

  const distractors = uniqueCandidates.slice(0, 3);
  return shuffle([correct, ...distractors]);
}

function renderStart() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card start-screen">
      <h2 style="color:#7B1535;">Pronto per iniziare?</h2>
      <p>${QUIZ_LENGTH} domande inedite di Metodologia della Ricerca, estratte a caso ogni volta tra le ${QUESTIONS.length} disponibili.
      Per ogni domanda vedrai 4 opzioni: quella giusta e 3 alternative scelte con cura sia per argomento sia per "lunghezza/struttura" simile alla risposta corretta (una risposta breve non sarà mai mischiata a frasi lunghe e descrittive, e viceversa), così da evitare opzioni palesemente fuori posto. Non vedrai se hai risposto bene o male durante il quiz: l'esito completo, domanda per domanda, sarà mostrato solo alla fine. Ad ogni tentativo le domande, l'ordine e le opzioni cambiano.</p>
      <button class="start" onclick="startQuiz()">Inizia il quiz</button>
    </div>
  `;
}

function startQuiz() {
  pool = shuffle(QUESTIONS).slice(0, QUIZ_LENGTH);
  current = 0;
  score = 0;
  userAnswers = [];
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const app = document.getElementById('app');
  const q = pool[current];
  const options = buildOptions(current);
  const pct = Math.round((current / pool.length) * 100);

  app.innerHTML = `
    <div class="topbar">
      <span>Domanda ${current + 1} / ${pool.length}</span>
      <span>Quiz da ${pool.length} domande</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="block-tag">${q.block.replace('BLOCCO ', 'Blocco ')}</div>
      <div class="question">${q.q}</div>
      <div class="options" id="options"></div>
      <div class="controls"><button class="next" id="nextBtn" onclick="nextQuestion()">${current + 1 === pool.length ? 'Vedi risultati →' : 'Avanti →'}</button></div>
    </div>
  `;

  const optsDiv = document.getElementById('options');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectOption(btn, opt, q.a);
    optsDiv.appendChild(btn);
  });
}

function selectOption(btn, chosen, correctAnswer) {
  const buttons = document.querySelectorAll('.option');
  buttons.forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  userAnswers[current] = { q: pool[current].q, block: pool[current].block, correct: correctAnswer, chosen: chosen };

  document.getElementById('nextBtn').style.display = 'inline-block';
}

function nextQuestion() {
  current++;
  if (current >= pool.length) {
    renderScore();
  } else {
    renderQuestion();
  }
}

function renderScore() {
  score = userAnswers.filter(a => a && a.chosen === a.correct).length;
  const app = document.getElementById('app');
  const pct = Math.round((score / pool.length) * 100);

  let reviewHtml = '<div class="review-list"><strong>Riepilogo domanda per domanda:</strong>';
  userAnswers.forEach((a, i) => {
    const isCorrect = a && a.chosen === a.correct;
    reviewHtml += `
      <div class="review-item">
        <div class="rblock">${a.block.replace('BLOCCO ', 'Blocco ')}</div>
        <div class="rq">${i + 1}. ${a.q}</div>
        <div style="color:${isCorrect ? '#1E7B34' : '#B3261E'};">La tua risposta: ${a.chosen}</div>
        ${isCorrect ? '' : `<div class="ra">Risposta corretta: ${a.correct}</div>`}
      </div>`;
  });
  reviewHtml += '</div>';

  app.innerHTML = `
    <div class="card score-screen">
      <h2>Quiz completato</h2>
      <div class="score-big">${score} / ${pool.length}</div>
      <div class="score-sub">${pct}% di risposte corrette</div>
      <button class="restart" onclick="startQuiz()">Rifai il quiz (nuove domande)</button>
      ${reviewHtml}
    </div>
  `;
}

renderStart();
</script>
